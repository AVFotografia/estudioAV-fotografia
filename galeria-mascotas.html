<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amores Peludos - Nuestra Mirada</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0a0a0a; color: white; font-family: 'Poppins', sans-serif; }
        
        header { padding: 60px 20px; text-align: center; }
        header h1 { text-transform: uppercase; letter-spacing: 8px; font-weight: 600; margin: 0; }
        
        .btn-volver { 
            display: inline-block; margin-top: 20px; color: #3498db; text-decoration: none; 
            font-size: 0.8em; letter-spacing: 2px; border: 1px solid #3498db; 
            padding: 10px 20px; border-radius: 30px; transition: 0.3s; 
        }
        .btn-volver:hover { background: #3498db; color: white; }

        .galeria-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 20px; 
            padding: 0 40px 100px; 
            max-width: 1600px; 
            margin: 0 auto; 
        }

        .foto-item { 
            position: relative;
            width: 100%; 
            height: 450px; 
            border-radius: 20px; 
            overflow: hidden; 
            background: #111; 
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .foto-item.visible { opacity: 1; transform: translateY(0); }

        .foto-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1);
            cursor: pointer; 
        }

        .foto-item:hover img { transform: scale(1.1); filter: brightness(0.7); }

        .foto-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
            box-sizing: border-box;
        }

        .foto-item:hover .foto-info { opacity: 1; }
        .firma { font-size: 0.75em; letter-spacing: 2px; font-weight: 300; text-transform: uppercase; }

        @media (max-width: 768px) { 
            .galeria-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); padding: 0 15px; } 
            .foto-item { height: 250px; border-radius: 10px; } 
        }
    </style>
</head>
<body>

    <header>
        <h1>AMORES PELUDOS</h1>
        <a href="index.html" class="btn-volver">← VOLVER AL PORTFOLIO</a>
    </header>

    <div class="galeria-grid" id="galeria-mascotas">
        </div>

    <script>
        const grid = document.getElementById('galeria-mascotas');
        const cloudName = "nuestramirada";
        const categoria = "Amores_peludos"; // Coincide con el nombre del script de Python
        const totalFotos = 30; 

        for (let i = 1; i <= totalFotos; i++) {
            const autorShort = (i % 2 !== 0) ? "Agus" : "Ara";
            const nombreCompleto = (i % 2 !== 0) ? "Agustina Valderrama" : "Araceli Villalba";
            
            const nombreArchivo = `${categoria}_${autorShort}_${i}.jpg`;

            const div = document.createElement('div');
            div.className = 'foto-item';

            const img = document.createElement('img');
            // Usamos f_auto y q_auto para que las fotos de los pichichos carguen rápido
            img.src = `https://res.cloudinary.com/${cloudName}/image/upload/f_auto,q_auto/${nombreArchivo}`;
            img.alt = `Fotografía de mascotas - ${categoria}`;
            img.loading = "lazy";

            img.onload = () => {
                div.classList.add('visible');
                const info = document.createElement('div');
                info.className = 'foto-info';
                info.innerHTML = `<span class="firma">By ${nombreCompleto}</span>`;
                div.appendChild(info);
            };

            // Si llegamos al final de las fotos disponibles, el error limpia el contenedor
            img.onerror = () => div.remove();

            div.appendChild(img);
            grid.appendChild(div);
        }
    </script>
</body>
</html>
