<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amores Peludos - Nuestra Mirada</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0a0a0a; color: white; font-family: 'Poppins', sans-serif; }
        
        header { padding: 60px 20px; text-align: center; }
        header h1 { text-transform: uppercase; letter-spacing: 8px; font-weight: 600; margin: 0; }
        .btn-volver { 
            display: inline-block; margin-top: 20px; color: #3498db; 
            text-decoration: none; font-size: 0.8em; letter-spacing: 2px; 
            border: 1px solid #3498db; padding: 10px 20px; border-radius: 30px;
            transition: 0.3s;
        }
        .btn-volver:hover { background: #3498db; color: white; }

        .galeria-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            padding: 0 20px 100px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .foto-item { width: 100%; height: 400px; border-radius: 15px; overflow: hidden; background: #1a1a1a; }
        .foto-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; cursor: pointer; }
        .foto-item img:hover { transform: scale(1.05); filter: brightness(1.1); }

        @media (max-width: 768px) {
            .galeria-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
            .foto-item { height: 200px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>AMORES PELUDOS</h1>
        <a href="index.html" class="btn-volver">← VOLVER AL PORTFOLIO</a>
    </header>
