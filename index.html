<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casamientos - Nuestra Mirada</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0a0a0a;
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        /* Fondo 3D coherente con la portada */
        .fondo-3d {
            position: fixed; width: 100vw; height: 100vh;
            top: 0; left: 0; z-index: -1;
            filter: blur(80px); opacity: 0.3;
        }
        .circulo { position: absolute; border-radius: 50%; }
        .c1 { width: 400px; height: 400px; background: #8e44ad; top: -100px; right: -100px; }
        .c2 { width: 350px; height: 350px; background: #3498db; bottom: -50px; left: -100px; }

        header { text-align: center; padding: 60px 20px 40px; }
        header h1 { font-size: 2.5em; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 10px; }
        
        .btn-volver {
            text-decoration: none;
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 25px;
            border-radius: 50px;
            transition: 0.3s;
            font-size: 0.8em;
            letter-spacing: 2px;
        }
        .btn-volver:hover { background: white; color: black; }

        /* Grilla de Galería */
        .galeria-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            padding: 0 50px 100px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Tarjeta de Foto con Estilo Cristal */
        .foto-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: 0.4s;
        }
        .foto-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.3); }

        .foto-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .info-foto {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
        }

        .firma-autor {
            font-size: 0.7em;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.5;
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="fondo-3d">
        <div class="circulo c1"></div>
        <div class="circulo c2"></div>
    </div>

    <header>
        <a href="index.html" class="btn-volver">← VOLVER AL INICIO</a>
        <h1>CASAMIENTOS</h1>
    </header>

    <div class="galeria-container">
        
        <div class="foto-card">
            <img src="Imagenes/Casamientos/Agustina/foto1.jpg" alt="Boda 1">
            <div class="info-foto">
                <span class="firma-autor">Agustina Valderrama</span>
            </div>
        </div>

        <div class="foto-card">
            <img src="Imagenes/Casamientos/Araceli/foto1.jpg" alt="Boda 2">
            <div class="info-foto">
                <span class="firma-autor">Araceli Villalba</span>
            </div>
        </div>

        <div class="foto-card">
            <img src="Imagenes/Casamientos/Agustina/foto2.jpg" alt="Boda 3">
            <div class="info-foto">
                <span class="firma-autor">Agustina Valderrama</span>
            </div>
        </div>

        </div>

</body>
</html>
