<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Mirada - Portfolio</title>
    <style>
        /* --- ESTILOS GENERALES --- */
        body {
            margin: 0; padding: 0;
            background-color: #0a0a0a;
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* --- Fondo 3D con Luces --- */
        .fondo-3d {
            position: fixed; width: 100vw; height: 100vh;
            top: 0; left: 0; z-index: -1;
            filter: blur(80px); opacity: 0.5;
        }
        .circulo { position: absolute; border-radius: 50%; }
        .c1 { width: 400px; height: 400px; background: #8e44ad; top: -100px; right: -100px; }
        .c2 { width: 350px; height: 350px; background: #3498db; bottom: -50px; left: -100px; }

        header { text-align: center; padding: 60px 20px 20px; }
        header h1 { font-size: 3em; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }
        header p { font-weight: 300; opacity: 0.8; margin-bottom: 30px; }

        /* --- BOTONES DE FILTRO --- */
        .filtros { text-align: center; margin-bottom: 40px; }
        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 25px;
            margin: 5px;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
        }
        .filter-btn:hover, .filter-btn.active {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* --- GRILLA --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 0 50px 100px 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* --- GLASS CARDS --- */
        .categoria-card {
            position: relative;
            height: 380px;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            cursor: pointer;
        }

        /* Clase para ocultar tarjetas */
        .hide { display: none; }

        .categoria-card:hover {
            transform: translateY(-10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .card-img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0; z-index: -1;
            opacity: 0.6; transition: 0.4s;
        }
        .categoria-card:hover .card-img { opacity: 0.9; }

        .card-content {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 25px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            box-sizing: border-box;
        }
        .card-content h3 { margin: 0; font-size: 1.4em; }
        .card-content p { margin: 5px 0 0; font-size: 0.85em; opacity: 0.8; letter-spacing: 1px; }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="fondo-3d">
        <div class="circulo c1"></div>
        <div class="circulo c2"></div>
    </div>

    <header>
        <h1>Nuestra Mirada</h1>
        <p>Portfolio por Agustina Valderrama & Araceli Villalba</p>
    </header>

    <div class="filtros">
        <button class="filter-btn active" onclick="filterSelection('all')">Todo el Equipo</button>
        <button class="filter-btn" onclick="filterSelection('agustina')">Agustina</button>
        <button class="filter-btn" onclick="filterSelection('araceli')">Araceli</button>
    </div>

    <div class="grid-container">
        
        <div class="categoria-card filter-item agustina">
            <img src="Imagenes/Casamientos/Agustina/portada.jpg" alt="Casamientos Agustina" class="card-img">
            <div class="card-content">
                <h3>Casamientos</h3>
                <p>MIRADA DE AGUSTINA</p>
            </div>
        </div>

        <div class="categoria-card filter-item araceli">
            <img src="Imagenes/Casamientos/Araceli/portada.jpg" alt="Casamientos Araceli" class="card-img">
            <div class="card-content">
                <h3>Casamientos</h3>
                <p>MIRADA DE ARACELI</p>
            </div>
        </div>

        <div class="categoria-card filter-item agustina">
            <img src="Imagenes/Quinces/Agustina/portada.jpg" alt="Quinces Agustina" class="card-img">
            <div class="card-content">
                <h3>Quinces</h3>
                <p>MIRADA DE AGUSTINA</p>
            </div>
        </div>

        <div class="categoria-card filter-item araceli">
            <img src="Imagenes/Quinces/Araceli/portada.jpg" alt="Quinces Araceli" class="card-img">
            <div class="card-content">
                <h3>Quinces</h3>
                <p>MIRADA DE ARACELI</p>
            </div>
        </div>

    </div>

    <script>
        function filterSelection(c) {
            var x, i;
            x = document.getElementsByClassName("filter-item");
            if (c == "all") c = "";
            for (i = 0; i < x.length; i++) {
                x[i].classList.add("hide");
                if (x[i].className.indexOf(c) > -1) x[i].classList.remove("hide");
            }
            
            // Lógica de botones activos
            var btns = document.getElementsByClassName("filter-btn");
            for (var i = 0; i < btns.length; i++) {
                btns[i].addEventListener("click", function(){
                    var current = document.getElementsByClassName("active");
                    current[0].className = current[0].className.replace(" active", "");
                    this.className += " active";
                });
            }
        }
<div style="max-width: 900px; margin: 80px auto; padding: 50px 20px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
        
        <h2 style="text-transform: uppercase; letter-spacing: 4px; font-weight: 600; margin-bottom: 10px;">¿Hablamos?</h2>
        <p style="opacity: 0.6; font-weight: 300; margin-bottom: 40px; font-size: 1.1em;">Consultanos disponibilidad de fecha o presupuestos personalizados.</p>
        
        <div style="display: flex; justify-content: center; gap: 25px; flex-wrap: wrap;">

                WHATSAPP AGUSTINA
            </a>
            
            <a href="https://wa.me/5491122863092?text=Hola%20Ara!%20Vi%20tu%20web%20y%20quería%20consultarte%20por%20una%20sesión/evento..." 
               target="_blank" 
               style="text-decoration: none; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 18px 35px; border-radius: 50px; font-weight: 600; font-size: 0.9em; transition: 0.3s; display: inline-block; backdrop-filter: blur(10px);">
                WHATSAPP ARACELI
            </a>

        </div>

        <p style="margin-top: 40px; font-size: 0.8em; opacity: 0.4; letter-spacing: 2px;">BUENOS AIRES, ARGENTINA</p>
    </div>
    </script>

</body>
</html>
