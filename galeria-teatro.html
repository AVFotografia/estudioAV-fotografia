<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teatro - Nuestra Mirada</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0a0a0a; color: white; font-family: 'Poppins', sans-serif; }
        
        header { padding: 60px 20px 30px; text-align: center; }
        header h1 { text-transform: uppercase; letter-spacing: 8px; font-weight: 600; margin: 0; }
        
        .btn-volver { 
            display: inline-block; margin-top: 20px; color: #3498db; text-decoration: none; 
            font-size: 0.8em; letter-spacing: 2px; border: 1px solid #3498db; 
            padding: 10px 20px; border-radius: 30px; transition: 0.3s; 
        }
        .btn-volver:hover { background: #3498db; color: white; }

        /* ESTILO PINTEREST (MASONRY) */
        .galeria-masonry { 
            column-count: 3;
            column-gap: 20px;
            padding: 20px 40px 100px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .foto-item { 
            display: inline-block;
            width: 100%; 
            margin-bottom: 20px;
            break-inside: avoid;
            border-radius: 15px; 
            overflow: hidden; 
            background: #111; 
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .foto-item.visible { opacity: 1; transform: translateY(0); }

        .foto-item img { 
            width: 100%; 
            height: auto;
            display: block;
            transition: 0.6s ease;
            cursor: pointer; 
        }

        .foto-item:hover img { transform: scale(1.05); filter: brightness(1.1); }

        .foto-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
            box-sizing: border-box;
        }

        .foto-item:hover .foto-info { opacity: 1; }
        .firma { font-size: 0.7em; letter-spacing: 2px; text-transform: uppercase; }

        /* RESPONSIVE */
        @media (max-width: 1024px) { .galeria-masonry { column-count: 2; } }
        @media (max-width: 600px) { 
            .galeria-masonry { column-count: 2; column-gap: 10px; padding: 10px; } 
            .foto-item { margin-bottom: 10px; border-radius: 8px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>TEATRO</h1>
        <a href="index.html" class="btn-volver">← VOLVER AL PORTFOLIO</a>
    </header>

    <div class="galeria-masonry" id="galeria-teatro">
        </div>

    <script>
        const grid = document.getElementById('galeria-teatro');
        const cloudName = "nuestramirada";
        const categoria = "Teatro"; 
        const totalFotos = 25; // Podés subirlo si tenés más

        for (let i = 1; i <= totalFotos; i++) {
            const autorShort = (i % 2 !== 0) ? "Agus" : "Ara";
            const nombreCompleto = (i % 2 !== 0) ? "Agustina Valderrama" : "Araceli Villalba";
            const nombreArchivo = `${categoria}_${autorShort}_${i}.jpg`;

            const div = document.createElement('div');
            div.className = 'foto-item';

            const img = document.createElement('img');
            img.src = `https://res.cloudinary.com/${cloudName}/image/upload/f_auto,q_auto/${nombreArchivo}`;
            img.loading = "lazy";

            img.onload = () => {
                div.classList.add('visible');
                const info = document.createElement('div');
                info.className = 'foto-info';
                info.innerHTML = `<span class="firma">By ${nombreCompleto}</span>`;
                div.appendChild(info);
            };

            img.onerror = () => div.remove();

            div.appendChild(img);
            grid.appendChild(div);
        }
    </script>
</body>
</html>
