<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casamientos - Nuestra Mirada</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0a0a0a;
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        /* Fondo 3D coherente */
        .fondo-3d {
            position: fixed; width: 100vw; height: 100vh;
            top: 0; left: 0; z-index: -1;
            filter: blur(80px); opacity: 0.3;
        }
        .circulo { position: absolute; border-radius: 50%; }
        .c1 { width: 400px; height: 400px; background: #8e44ad; top: -100px; right: -100px; }
        .c2 { width: 350px; height: 350px; background: #3498db; bottom: -50px; left: -100px; }

        header { text-align: center; padding: 60px 20px 40px; }
        header h1 { font-size: 2.5em; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 20px; }
        
        .btn-volver {
            text-decoration: none;
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 25px;
            border-radius: 50px;
            transition: 0.3s;
            font-size: 0.8em;
            letter-spacing: 2px;
            backdrop-filter: blur(10px);
        }
        .btn-volver:hover { background: white; color: black; }

        /* Grilla Automática */
        .galeria-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 40px;
            padding: 0 50px 100px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Estilo Cristal */
        .foto-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: 0.4s;
            display: none; /* Se oculta por defecto */
        }

        .foto-card.visible { display: block; }

        .foto-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .foto-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .foto-info {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.4);
        }

        .firma {
            display: block;
            font-size: 0.75em;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #3498db;
            font-weight: 600;
        }
        /* --- BURBUJA PERMANENTE --- */
        .wsp-flotante {
            position: fixed; bottom: 30px; right: 30px; z-index: 100;
            display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
        }
        .btn-burbuja {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2);
            width: 60px; height: 60px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); transition: 0.4s;
        }
        .btn-burbuja svg { width: 30px; height: 30px; fill: white; }
        .opciones-wsp {
            display: none; flex-direction: column; gap: 10px; margin-bottom: 10px;
            animation: fadeIn 0.3s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .link-wsp {
            background: white; color: black; padding: 10px 20px; border-radius: 30px;
            text-decoration: none; font-size: 0.8em; font-weight: 600; white-space: nowrap;
        }
        .wsp-flotante:hover .opciones-wsp { display: flex; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="fondo-3d">
        <div class="circulo c1"></div>
        <div class="circulo c2"></div>
    </div>

    <header>
        <a href="index.html" class="btn-volver">← VOLVER</a>
        <h1>CASAMIENTOS</h1>
    </header>

    <div class="galeria-grid" id="contenedor-casamientos">
        </div>

    <script>
        const cantidadFotos = 20;
        // Ajustá estas rutas a tus carpetas reales
        const rutaAgus = "Imagenes/Casamientos/Agustina/";
        const rutaAra = "Imagenes/Casamientos/Araceli/";
        const contenedor = document.getElementById('contenedor-casamientos');

        function cargarGaleria() {
            // Buscamos fotos de ambas
            for (let i = 1; i <= cantidadFotos; i++) {
                intentarCargar(rutaAgus + i + ".jpg", "Agustina Valderrama");
                intentarCargar(rutaAra + i + ".jpg", "Araceli Villalba");
            }
        }

        function intentarCargar(url, nombre) {
            const img = new Image();
            img.src = url;

            img.onload = function() {
                const card = document.createElement('div');
                card.className = 'foto-card visible';
                card.innerHTML = `
                    <img src="${url}">
                    <div class="foto-info">
                        <span class="firma">By ${nombre}</span>
                    </div>
                `;
                contenedor.appendChild(card);
            };
            // Si no existe (error 404), el script simplemente no hace nada.
        }

        cargarGaleria();
    </script>

    <div class="wsp-flotante">
        <div class="opciones-wsp">
            <a href="https://wa.me/5491137645315" target="_blank" class="link-wsp">Chat con Agus</a>
            <a href="https://wa.me/5491122863092" target="_blank" class="link-wsp">Chat con Ara</a>
        </div>
        <div class="btn-burbuja">
            <svg viewBox="0 0 448 512"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-117zm-157 338.7c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-5.5-2.8-23.2-8.5-44.2-27.1-16.4-14.6-27.4-32.7-30.6-38.2-3.2-5.6-.3-8.6 2.5-11.3 2.5-2.5 5.5-6.5 8.3-9.7 2.8-3.3 3.7-5.5 5.5-9.2 1.9-3.7 1-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 13.2 5.8 23.5 9.2 31.5 11.8 13.3 4.2 25.4 3.6 35 2.2 10.7-1.5 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/></svg>
        </div>
    </div>
    
</body>
</html>
